<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Tab Organizer - Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="options">
    <h1>Smart Tab Organizer Settings</h1>
    <form id="settingsForm">
      <label>
        <input type="checkbox" id="includePinnedTabs">
        Include pinned tabs in organize/deduplicate actions
      </label>

      <label>
        <input type="checkbox" id="autoApplyRules">
        Auto-apply rules once a day (in the background)
      </label>

      <label>
        Bookmark threshold count
        <input type="number" id="bookmarkThresholdCount" min="1" max="100" required>
      </label>

      <label>
        Bookmark threshold days
        <input type="number" id="bookmarkThresholdDays" min="1" max="365" required>
      </label>

      <label>
        Low-use lookback months
        <input type="number" id="lowUseLookbackMonths" min="1" max="120" required>
      </label>

      <label>
        Low-use max visits (recommend at or below)
        <input type="number" id="lowUseMaxVisitCount" min="0" max="100" required>
      </label>

      <label>
        Activity retention days
        <input type="number" id="retentionDays" min="1" max="365" required>
      </label>

      <label>
        Excluded URL patterns (one per line)
        <textarea id="excludedPatterns" rows="8"></textarea>
      </label>

      <section class="actions">
        <button type="submit" class="primary">Save Settings</button>
        <button type="button" id="clearDataBtn">Delete Extension Data</button>
      </section>
    </form>
    <p id="settingsStatus"></p>
  </main>

  <main class="options">
    <h1>Auto-Organizer Rules</h1>
    <p class="rules-description">Rules are evaluated in order. The first matching rule wins. Pinned tabs follow the "Include pinned tabs" setting above.</p>

    <div id="rulesList"></div>

    <section class="actions">
      <button type="button" id="addRuleBtn" class="primary">Add Rule</button>
      <button type="button" id="applyRulesBtn">Apply Rules Now</button>
    </section>
    <p id="rulesStatus"></p>
  </main>

  <script src="options.js"></script>
</body>
</html>
